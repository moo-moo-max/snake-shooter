<!DOCTYPE html>
<html>
<head>
  <title>Snake Shooter</title>
  <style>
    body { margin: 0; overflow: hidden; background: #222; }
    canvas { display: block; margin: auto; background: #fff; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 600;

// GRID SIZE (NEW)
const gridSize = 20;

// Player
let player = {
  x: canvas.width / 2 - 20,
  y: canvas.height - 60,
  width: 40,
  height: 40,
  speed: 6,
  health: 3
};

// Bullets
let bullets = [];
let bulletSpeed = 8;

// Snakes (segmented)
let snakes = [];

function createSnake() {
  let segments = [];
  let startX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
  let startY = Math.floor(Math.random() * (canvas.height / 2 / gridSize)) * gridSize;

  for (let i = 0; i < 6; i++) {
    segments.push({ x: startX - i * gridSize, y: startY });
  }

  return {
    segments: segments,
    dir: Math.random() < 0.5 ? -1 : 1,
    speed: gridSize,
    moveTimer: 0
  };
}

for (let i = 0; i < 5; i++) {
  snakes.push(createSnake());
}

// Controls
let keys = {};
document.addEventListener("keydown", e => {
  keys[e.key] = true;

  if (e.key === " ") {
    bullets.push({ x: player.x + 18, y: player.y });
  }

  if (gameOver && e.key === "Enter") {
    restartGame();
  }
});

document.addEventListener("keyup", e => {
  keys[e.key] = false;
});

// Score & state
let score = 0;
let gameOver = false;

// Update
function update() {
  if (gameOver) return;

  // Player movement
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;
  player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

  // Bullets
  bullets.forEach((b, i) => {
    b.y -= bulletSpeed;
    if (b.y < 0) bullets.splice(i, 1);
  });

  // Snakes (UPDATED TO GRID MOVEMENT)
  snakes.forEach(snake => {
    snake.moveTimer++;

    // slow step movement (Snake-style)
    if (snake.moveTimer < 6) return;
    snake.moveTimer = 0;

    let head = { ...snake.segments[0] };

    head.x += snake.speed * snake.dir;

    // bounce off walls
    if (head.x < 0 || head.x >= canvas.width) {
      snake.dir *= -1;
      head.x += snake.speed * snake.dir;
    }

    snake.segments.unshift(head);
    snake.segments.pop();

    // Bullet collision
    bullets.forEach((b, bi) => {
      if (
        b.x > head.x &&
        b.x < head.x + gridSize &&
        b.y > head.y &&
        b.y < head.y + gridSize
      ) {
        bullets.splice(bi, 1);
        Object.assign(snake, createSnake());
        score++;
      }
    });

    // Player collision
    if (
      head.y + gridSize > player.y &&
      head.x < player.x + player.width &&
      head.x + gridSize > player.x
    ) {
      player.health--;
      Object.assign(snake, createSnake());

      if (player.health <= 0) {
        gameOver = true;
      }
    }
  });
}

// Draw snake (UPDATED STYLE)
function drawSnake(snake) {
  snake.segments.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? "#0a0" : "#2ecc71";
    ctx.fillRect(seg.x, seg.y, gridSize, gridSize);

    // retro outline
    ctx.strokeStyle = "#0f0";
    ctx.strokeRect(seg.x, seg.y, gridSize, gridSize);
  });
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = "black";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Bullets
  ctx.fillStyle = "red";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 10));

  // Snakes
  snakes.forEach(drawSnake);

  // UI
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 25);
  ctx.fillText("Health: " + player.health, 10, 50);

  // Game Over screen
  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", 280, 250);

    ctx.font = "20px Arial";
    ctx.fillText("Final Score: " + score, 330, 300);
    ctx.fillText("Press ENTER to restart", 290, 340);
  }
}

// Restart
function restartGame() {
  player.health = 3;
  score = 0;
  bullets = [];
  snakes = [];

  for (let i = 0; i < 5; i++) {
    snakes.push(createSnake());
  }

  gameOver = false;
}

// Loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
